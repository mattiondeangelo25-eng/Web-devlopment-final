<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Life Super App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Main Header -->
<header class="bg-primary text-white text-center py-4">
    <h1>Campus Life Super App</h1>
    <p>Everything you need for a smooth campus experience</p>
</header>

<main class="container mt-4">
    <section>
        <h2>Features</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="event.jpg" alt="Event Calendar" class="card-img-top" />
                    <div class="card-body">
                        <h5 class="card-title">Event Calendar</h5>
                        <p class="card-text">Stay updated with the latest campus events!</p>
                        <a href="events.html" class="btn btn-primary">View Events</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="map.jpg" alt="Campus Map" class="card-img-top" />
                    <div class="card-body">
                        <h5 class="card-title">Campus Map</h5>
                        <p class="card-text">Navigate the campus with ease using the interactive map.</p>
                        <a href="map.html" class="btn btn-primary">View Map</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2026 Campus Life Super App</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
